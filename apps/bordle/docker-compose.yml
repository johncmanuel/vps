services:
  bordle_db:
    image: postgres:16-alpine
    container_name: bordle_db
    restart: always
    env_file:
      - ./apps/bordle/.env
    volumes:
      - bordle_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d bordle -U bordle"]
      interval: 10s
      timeout: 5s
      retries: 5

  bordle_server:
    build:
      context: ./bordle 
      dockerfile: apps/server/Dockerfile
      args:
        CONFIGURATION: Release
    container_name: bordle_server
    restart: always
    env_file:
      - ./apps/bordle/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    depends_on:
      bordle_db:
        condition: service_healthy

  bordle_client:
    build:
      context: ./bordle 
      dockerfile: apps/client/Dockerfile
      args:
        - VITE_DISCORD_CLIENT_ID=${VITE_DISCORD_CLIENT_ID}
    container_name: bordle_client
    restart: always
    env_file:
      - ./apps/bordle/.env
    environment:
      - VIRTUAL_HOST=bordle.${MAIN_DOMAIN}
      - LETSENCRYPT_HOST=bordle.${MAIN_DOMAIN}
      - VIRTUAL_PORT=80
    depends_on:
      - bordle_server

volumes:
  bordle_db_data:
