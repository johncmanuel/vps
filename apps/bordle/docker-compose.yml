services:
  bordle_db:
    image: postgres:16-alpine
    container_name: bordle_db
    restart: always
    env_file:
      - ./.env
    volumes:
      - bordle_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d bordle -U bordle"]
      interval: 10s
      timeout: 5s
      retries: 5

  bordle_server:
    image: ghcr.io/johncmanuel/bordle-server:latest
    container_name: bordle_server
    restart: always
    env_file:
      - ./.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    depends_on:
      bordle_db:
        condition: service_healthy

  bordle_client:
    image: ghcr.io/johncmanuel/bordle-client:latest
    container_name: bordle_client
    restart: always
    env_file:
      - ./.env
    environment:
      - VIRTUAL_HOST=bordle.${MAIN_DOMAIN}
      - LETSENCRYPT_HOST=bordle.${MAIN_DOMAIN}
      # The client Dockerfile serves via Caddy on port 8080
      - VIRTUAL_PORT=8080
      - VITE_DISCORD_CLIENT_ID=${VITE_DISCORD_CLIENT_ID}
    depends_on:
      - bordle_server

volumes:
  bordle_db_data:
